
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans)}
.app{max-width:900px;margin:0 auto;padding:1rem}
h1{font-size:18px;font-weight:500;color:var(--color-text-primary);margin-bottom:1.5rem}
.upload-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1.5rem}
@media(max-width:500px){.upload-grid{grid-template-columns:1fr}}
.upload-box{border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-lg);padding:1rem;text-align:center;cursor:pointer;background:var(--color-background-secondary);transition:background 0.15s}
.upload-box:hover{background:var(--color-background-tertiary)}
.upload-box input{display:none}
.upload-box .icon{width:32px;height:32px;border-radius:50%;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);display:flex;align-items:center;justify-content:center;margin:0 auto 8px;font-size:18px}
.upload-box .label{font-size:13px;font-weight:500;color:var(--color-text-primary)}
.upload-box .hint{font-size:12px;color:var(--color-text-secondary);margin-top:4px}
.upload-box .preview{max-width:100%;max-height:80px;object-fit:contain;margin:8px auto 0;display:block;border-radius:4px}
.controls{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1rem;margin-bottom:1.5rem;background:var(--color-background-primary)}
.ctrl-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.ctrl-row:last-child{margin-bottom:0}
.ctrl-label{font-size:13px;color:var(--color-text-secondary);min-width:52px}
.ctrl-row input[type=range]{flex:1}
.ctrl-val{font-size:13px;font-weight:500;color:var(--color-text-primary);min-width:40px;text-align:right}
.canvas-wrap{position:relative;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden;background:#f0f0f0;background-image:linear-gradient(45deg,#ccc 25%,transparent 25%),linear-gradient(-45deg,#ccc 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#ccc 75%),linear-gradient(-45deg,transparent 75%,#ccc 75%);background-size:16px 16px;background-position:0 0,0 8px,8px -8px,-8px 0;margin-bottom:1.5rem;touch-action:none;user-select:none}
canvas{display:block;max-width:100%;height:auto}
.placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;height:200px;color:var(--color-text-tertiary);font-size:14px;gap:8px}
.btn-dl{width:100%;padding:10px;font-size:14px;font-weight:500;background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);cursor:pointer;color:var(--color-text-primary);transition:background 0.15s}
.btn-dl:hover{background:var(--color-background-secondary)}
.btn-dl:disabled{opacity:0.4;cursor:not-allowed}
.reset-btn{font-size:12px;color:var(--color-text-secondary);cursor:pointer;text-decoration:underline;margin-left:auto}
.section-title{font-size:13px;font-weight:500;color:var(--color-text-secondary);margin-bottom:8px}
</style>

<div class="app">
  <h2 class="sr-only">浮水印編輯器 — 上傳底圖與浮水印，調整位置、大小、透明度後下載</h2>
  <h1>浮水印編輯器</h1>

  <div class="upload-grid">
    <label class="upload-box" id="bg-box">
      <input type="file" accept="image/*" id="bg-input">
      <div class="icon">🖼</div>
      <div class="label">底圖</div>
      <div class="hint" id="bg-hint">點擊上傳圖片</div>
      <img id="bg-preview" class="preview" style="display:none">
    </label>
    <label class="upload-box" id="wm-box">
      <input type="file" accept="image/*" id="wm-input">
      <div class="icon">💧</div>
      <div class="label">浮水印</div>
      <div class="hint" id="wm-hint">點擊上傳圖片</div>
      <img id="wm-preview" class="preview" style="display:none">
    </label>
  </div>

  <div class="controls">
    <div class="section-title">浮水印設定</div>
    <div class="ctrl-row">
      <span class="ctrl-label">大小</span>
      <input type="range" id="wm-size" min="5" max="100" step="1" value="30">
      <span class="ctrl-val" id="wm-size-val">30%</span>
    </div>
    <div class="ctrl-row">
      <span class="ctrl-label">透明度</span>
      <input type="range" id="wm-opacity" min="0" max="100" step="1" value="80">
      <span class="ctrl-val" id="wm-opacity-val">80%</span>
    </div>
    <div class="ctrl-row">
      <span class="ctrl-label">旋轉</span>
      <input type="range" id="wm-rotate" min="-180" max="180" step="1" value="0">
      <span class="ctrl-val" id="wm-rotate-val">0°</span>
      <span class="reset-btn" id="reset-rotate">重置</span>
    </div>
  </div>

  <div class="canvas-wrap" id="canvas-wrap">
    <div class="placeholder" id="placeholder">
      <span style="font-size:32px">🖼</span>
      <span>請先上傳底圖</span>
    </div>
    <canvas id="main-canvas" style="display:none"></canvas>
  </div>

  <button class="btn-dl" id="dl-btn" disabled>下載圖片</button>
</div>

<script>
const bgInput = document.getElementById('bg-input');
const wmInput = document.getElementById('wm-input');
const canvas = document.getElementById('main-canvas');
const ctx = canvas.getContext('2d');
const placeholder = document.getElementById('placeholder');
const sizeSlider = document.getElementById('wm-size');
const opacitySlider = document.getElementById('wm-opacity');
const rotateSlider = document.getElementById('wm-rotate');
const dlBtn = document.getElementById('dl-btn');

let bgImg = null, wmImg = null;
let wmX = 0.5, wmY = 0.5;
let isDragging = false;
let dragStartX, dragStartY, dragStartWmX, dragStartWmY;
let pinchStartDist = 0, pinchStartSize = 30;

function loadImage(file, cb) {
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => cb(img);
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

bgInput.addEventListener('change', e => {
  if (!e.target.files[0]) return;
  loadImage(e.target.files[0], img => {
    bgImg = img;
    document.getElementById('bg-hint').textContent = e.target.files[0].name;
    const prev = document.getElementById('bg-preview');
    prev.src = img.src; prev.style.display = 'block';
    setupCanvas(); draw();
  });
});

wmInput.addEventListener('change', e => {
  if (!e.target.files[0]) return;
  loadImage(e.target.files[0], img => {
    wmImg = img;
    document.getElementById('wm-hint').textContent = e.target.files[0].name;
    const prev = document.getElementById('wm-preview');
    prev.src = img.src; prev.style.display = 'block';
    draw();
  });
});

function setupCanvas() {
  if (!bgImg) return;
  const maxW = document.getElementById('canvas-wrap').clientWidth;
  const scale = Math.min(1, maxW / bgImg.width);
  canvas.width = bgImg.width;
  canvas.height = bgImg.height;
  canvas.style.width = Math.round(bgImg.width * scale) + 'px';
  canvas.style.height = Math.round(bgImg.height * scale) + 'px';
  placeholder.style.display = 'none';
  canvas.style.display = 'block';
  dlBtn.disabled = false;
}

function draw() {
  if (!bgImg) return;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.drawImage(bgImg, 0, 0);
  if (!wmImg) return;
  const size = parseInt(sizeSlider.value) / 100;
  const opacity = parseInt(opacitySlider.value) / 100;
  const angle = parseInt(rotateSlider.value) * Math.PI / 180;
  const wmW = bgImg.width * size;
  const wmH = wmImg.height * (wmW / wmImg.width);
  const cx = wmX * bgImg.width;
  const cy = wmY * bgImg.height;
  ctx.save();
  ctx.globalAlpha = opacity;
  ctx.translate(cx, cy);
  ctx.rotate(angle);
  ctx.drawImage(wmImg, -wmW / 2, -wmH / 2, wmW, wmH);
  ctx.restore();
}

[sizeSlider, opacitySlider, rotateSlider].forEach(s => s.addEventListener('input', () => {
  document.getElementById('wm-size-val').textContent = sizeSlider.value + '%';
  document.getElementById('wm-opacity-val').textContent = opacitySlider.value + '%';
  document.getElementById('wm-rotate-val').textContent = rotateSlider.value + '°';
  draw();
}));

document.getElementById('reset-rotate').addEventListener('click', () => {
  rotateSlider.value = 0;
  document.getElementById('wm-rotate-val').textContent = '0°';
  draw();
});

function getCanvasPos(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  return {
    x: ((e.clientX || e.touches[0].clientX) - rect.left) * scaleX,
    y: ((e.clientY || e.touches[0].clientY) - rect.top) * scaleY
  };
}

function startDrag(e) {
  if (!bgImg || !wmImg) return;
  e.preventDefault();
  if (e.touches && e.touches.length === 2) {
    pinchStartDist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
    pinchStartSize = parseInt(sizeSlider.value);
    return;
  }
  isDragging = true;
  const pos = getCanvasPos(e);
  dragStartX = pos.x; dragStartY = pos.y;
  dragStartWmX = wmX; dragStartWmY = wmY;
}

function moveDrag(e) {
  if (!bgImg || !wmImg) return;
  e.preventDefault();
  if (e.touches && e.touches.length === 2) {
    const dist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
    const newSize = Math.min(100, Math.max(5, Math.round(pinchStartSize * (dist / pinchStartDist))));
    sizeSlider.value = newSize;
    document.getElementById('wm-size-val').textContent = newSize + '%';
    draw(); return;
  }
  if (!isDragging) return;
  const pos = getCanvasPos(e);
  wmX = Math.min(1, Math.max(0, dragStartWmX + (pos.x - dragStartX) / bgImg.width));
  wmY = Math.min(1, Math.max(0, dragStartWmY + (pos.y - dragStartY) / bgImg.height));
  draw();
}

function endDrag() { isDragging = false; }

canvas.addEventListener('mousedown', startDrag);
canvas.addEventListener('mousemove', moveDrag);
canvas.addEventListener('mouseup', endDrag);
canvas.addEventListener('touchstart', startDrag, {passive:false});
canvas.addEventListener('touchmove', moveDrag, {passive:false});
canvas.addEventListener('touchend', endDrag);

dlBtn.addEventListener('click', () => {
  if (!bgImg) return;
  const a = document.createElement('a');
  a.download = 'watermarked.png';
  a.href = canvas.toDataURL('image/png');
  a.click();
});

window.addEventListener('resize', () => { if (bgImg) setupCanvas(); draw(); });
</script>
