name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main          # 每次推送到 main 分支時自動觸發#
  workflow_dispatch:  # 也可以在 Actions 頁面手動觸發#

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # 1. 取得程式碼
      - name: Checkout
        uses: actions/checkout@v4

      # 2. 把佔位符替換成真正的 Secret
      - name: Inject secrets into index.html
        run: |
          sed -i "s|{{SHEETS_API_KEY}}|${{ secrets.SHEETS_API_KEY }}|g" index.html
          sed -i "s|{{SHEET_ID}}|${{ secrets.SHEET_ID }}|g" index.html

      # 3. 設定 GitHub Pages
      - name: Setup Pages
        uses: actions/configure-pages@v4

      # 4. 上傳 index.html 到 Pages
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'   # 上傳整個根目錄

      # 5. 部署
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
