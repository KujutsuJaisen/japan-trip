<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎌 京坂行程表</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink:      #1a1a2e;
      --paper:    #faf9f6;
      --accent:   #c0392b;
      --accent2:  #e67e22;
      --muted:    #7f8c8d;
      --border:   #e8e4dc;
      --card-bg:  #ffffff;
      --tag-sight:  #e8f4f8;
      --tag-food:   #fef9e7;
      --tag-hotel:  #eaf4ea;
      --tag-shop:   #fdf2f8;
      --tag-sight-text:  #1a6a8a;
      --tag-food-text:   #a0620a;
      --tag-hotel-text:  #2e7d32;
      --tag-shop-text:   #8e24aa;
      --tag-other:       #f0eef8;
      --tag-other-text:  #5e35b1;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans TC', sans-serif;
      background: var(--paper);
      color: var(--ink);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    .site-header {
      background: var(--ink);
      color: #fff;
      text-align: center;
      padding: 2.5rem 1rem 2rem;
      position: relative;
      overflow: hidden;
    }
    .site-header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        45deg,
        transparent,
        transparent 40px,
        rgba(255,255,255,.03) 40px,
        rgba(255,255,255,.03) 41px
      );
    }
    .site-header h1 {
      font-family: 'Noto Serif TC', serif;
      font-size: clamp(1.6rem, 5vw, 2.4rem);
      font-weight: 700;
      letter-spacing: .08em;
      position: relative;
    }
    .site-header .subtitle {
      margin-top: .5rem;
      font-size: .9rem;
      color: rgba(255,255,255,.6);
      letter-spacing: .05em;
      position: relative;
    }

    /* ── DAY TABS ── */
    .tabs-wrapper {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--card-bg);
      border-bottom: 2px solid var(--border);
      box-shadow: 0 2px 8px rgba(0,0,0,.06);
    }
    .tabs {
      display: flex;
      overflow-x: auto;
      scrollbar-width: none;
      padding: 0 1rem;
    }
    .tabs::-webkit-scrollbar { display: none; }
    .tab-btn {
      flex-shrink: 0;
      padding: .85rem 1.2rem;
      border: none;
      background: none;
      cursor: pointer;
      font-family: 'Noto Sans TC', sans-serif;
      font-size: .85rem;
      font-weight: 500;
      color: var(--muted);
      border-bottom: 3px solid transparent;
      transition: color .2s, border-color .2s;
      white-space: nowrap;
    }
    .tab-btn:hover { color: var(--ink); }
    .tab-btn.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
      font-weight: 700;
    }

    /* ── MAIN LAYOUT ── */
    .container {
      max-width: 780px;
      margin: 0 auto;
      padding: 2rem 1rem 4rem;
    }

    /* ── DAY SECTION ── */
    .day-section { display: none; }
    .day-section.active { display: block; }

    .day-header {
      margin-bottom: 1.8rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }
    .day-header h2 {
      font-family: 'Noto Serif TC', serif;
      font-size: 1.5rem;
      font-weight: 700;
    }
    .day-header .day-date {
      font-size: .85rem;
      color: var(--muted);
      margin-top: .25rem;
    }

    /* ── ITEM CARD ── */
    .item-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.6rem 1.8rem;
      margin-bottom: 1rem;
      transition: box-shadow .2s;
      position: relative;
    }
    .item-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,.08); }

    .card-top {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .time-col {
      flex-shrink: 0;
      text-align: center;
      min-width: 100px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      align-self: stretch;
    }
    .time-start, .time-end {
      font-size: 1.75rem;
      font-weight: 800;
      color: var(--ink);
      line-height: 1.3;
      text-align: center;
      letter-spacing: -.02em;
    }
    .time-arrow {
      font-size: 1rem;
      color: var(--muted);
      text-align: center;
      line-height: 1;
      margin: .2rem 0;
    }
    .time-divider {
      width: 2px;
      align-self: stretch;
      background: var(--border);
      flex-shrink: 0;
      margin: 0 .4rem;
      border-radius: 2px;
    }
    .card-body { flex: 1; min-width: 0; padding-right: 7rem; }

    .card-title-row {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: .5rem;
      margin-bottom: .5rem;
    }
    .type-tag {
      display: inline-flex;
      align-items: center;
      gap: .25rem;
      font-size: .78rem;
      font-weight: 700;
      padding: .25rem .65rem;
      border-radius: 20px;
      white-space: nowrap;
    }
    .type-tag.sight  { background: var(--tag-sight);  color: var(--tag-sight-text); }
    .type-tag.food   { background: var(--tag-food);   color: var(--tag-food-text); }
    .type-tag.hotel  { background: var(--tag-hotel);  color: var(--tag-hotel-text); }
    .type-tag.shop   { background: var(--tag-shop);   color: var(--tag-shop-text); }
    .type-tag.other  { background: var(--tag-other);  color: var(--tag-other-text); }

    .place-link {
      font-family: 'Noto Serif TC', serif;
      font-size: 1.9rem;
      font-weight: 700;
      color: var(--ink);
      text-decoration: none;
      border-bottom: 2px solid transparent;
      transition: border-color .2s, color .2s;
      line-height: 1.35;
    }
    .place-link:hover {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }
    .place-link.no-link { cursor: default; }
    .place-link.no-link:hover { color: var(--ink); border-color: transparent; }

    /* 地點名稱列 */
    .place-nav-row {
      margin-bottom: .3rem;
    }

    /* 導航按鈕：右側垂直置中絕對定位，放大版 */
    .nav-btn {
      position: absolute;
      right: 1.4rem;
      top: 50%;
      transform: translateY(-50%);
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: .3rem;
      padding: .9rem 1.1rem;
      border-radius: 16px;
      background: #2e7d32;
      color: #fff;
      font-size: .95rem;
      font-weight: 700;
      text-decoration: none;
      border: none;
      transition: background .2s, transform .15s, box-shadow .2s;
      white-space: nowrap;
      box-shadow: 0 3px 10px rgba(46,125,50,.35);
      min-width: 64px;
      cursor: pointer;
    }
    .nav-btn:hover {
      background: #1b5e20;
      transform: translateY(calc(-50% - 2px));
      box-shadow: 0 6px 16px rgba(46,125,50,.45);
    }
    .nav-btn svg {
      width: 26px; height: 26px;
      fill: currentColor;
    }

    /* 備註區塊 */
    .card-notes {
      margin-top: .55rem;
      display: flex;
      flex-direction: column;
      gap: .35rem;
    }
    .note-item {
      display: flex;
      gap: .45rem;
      font-size: .88rem;
      color: #555;
      line-height: 1.55;
    }
    .note-label {
      font-size: .75rem;
      font-weight: 700;
      padding: .15rem .4rem;
      border-radius: 4px;
      background: #f0f0f0;
      color: #888;
      white-space: nowrap;
      align-self: flex-start;
      margin-top: .15rem;
    }

    .card-cost {
      margin-top: .65rem;
      display: inline-flex;
      align-items: center;
      gap: .3rem;
      font-size: .88rem;
      color: var(--accent2);
      font-weight: 600;
    }

    /* ── LOADING / ERROR ── */
    .state-msg {
      text-align: center;
      padding: 4rem 1rem;
      color: var(--muted);
      font-size: 1rem;
    }
    .state-msg .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── CONFIG BANNER ── */
    .config-banner {
      background: #fff3cd;
      border: 1px solid #ffc107;
      border-radius: 8px;
      padding: 1rem 1.2rem;
      margin-bottom: 1.5rem;
      font-size: .88rem;
      line-height: 1.7;
    }
    .config-banner strong { color: #856404; }
    .config-banner code {
      background: #f8f0d0;
      padding: .1rem .35rem;
      border-radius: 4px;
      font-size: .82rem;
    }

    /* ── RWD ── */
    @media (max-width: 560px) {
      .time-col { min-width: 72px; }
      .time-start, .time-end { font-size: 1.25rem; }
      .card-top { gap: .6rem; }
      .item-card { padding: 1.1rem 1rem; }
      .card-body { padding-right: 5.5rem; }
      .nav-btn { padding: .65rem .75rem; min-width: 52px; right: .9rem; }
      .nav-btn svg { width: 20px; height: 20px; }
      .nav-btn span { font-size: .8rem; }
      .place-link { font-size: 1.3rem; }
    }

    /* ── HAMBURGER BUTTON ── */
    .hamburger-btn {
      position: absolute;
      top: 50%;
      left: 1.2rem;
      transform: translateY(-50%);
      z-index: 200;
      background: rgba(255,255,255,.12);
      border: 1.5px solid rgba(255,255,255,.25);
      border-radius: 10px;
      width: 44px;
      height: 44px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
      cursor: pointer;
      transition: background .2s;
      padding: 0;
    }
    .hamburger-btn:hover { background: rgba(255,255,255,.22); }
    .hamburger-btn span {
      display: block;
      width: 22px;
      height: 2px;
      background: #fff;
      border-radius: 2px;
      transition: transform .3s, opacity .3s;
    }
    .hamburger-btn.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .hamburger-btn.open span:nth-child(2) { opacity: 0; }
    .hamburger-btn.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    /* ── SIDEBAR ── */
    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.45);
      z-index: 300;
      backdrop-filter: blur(2px);
    }
    .sidebar-overlay.open { display: block; }

    .sidebar {
      position: fixed;
      top: 0; left: 0;
      height: 100%;
      width: 260px;
      background: var(--ink);
      z-index: 400;
      transform: translateX(-100%);
      transition: transform .3s cubic-bezier(.4,0,.2,1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .sidebar.open { transform: translateX(0); }

    .sidebar-header {
      padding: 2rem 1.5rem 1.2rem;
      border-bottom: 1px solid rgba(255,255,255,.1);
    }
    .sidebar-header h2 {
      font-family: 'Noto Serif TC', serif;
      color: #fff;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: .05em;
    }
    .sidebar-header p {
      color: rgba(255,255,255,.5);
      font-size: .8rem;
      margin-top: .3rem;
    }

    .sidebar-nav {
      padding: 1rem 0;
      flex: 1;
    }
    .sidebar-nav-item {
      display: flex;
      align-items: center;
      gap: .85rem;
      padding: .9rem 1.5rem;
      color: rgba(255,255,255,.7);
      font-size: .95rem;
      font-weight: 500;
      cursor: pointer;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
      transition: background .2s, color .2s;
      border-left: 3px solid transparent;
    }
    .sidebar-nav-item:hover {
      background: rgba(255,255,255,.07);
      color: #fff;
    }
    .sidebar-nav-item.active {
      background: rgba(255,255,255,.1);
      color: #fff;
      border-left-color: var(--accent);
    }
    .sidebar-nav-item .nav-icon {
      font-size: 1.3rem;
      width: 28px;
      text-align: center;
    }

    /* ── PAGE 切換 ── */
    .page { display: none; }
    .page.active { display: block; }

    /* tabs-wrapper 只在行程頁顯示 */
    .tabs-wrapper { display: none; }
    .tabs-wrapper.visible { display: block; }

    /* ── WEATHER PAGE ── */
    .weather-container {
      max-width: 780px;
      margin: 0 auto;
      padding: 2rem 1rem 4rem;
    }
    .weather-page-title {
      font-family: 'Noto Serif TC', serif;
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: .4rem;
    }
    .weather-page-subtitle {
      font-size: .88rem;
      color: var(--muted);
      margin-bottom: 1.8rem;
    }

    /* 城市選擇器 */
    .city-tabs {
      display: flex;
      gap: .6rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }
    .city-tab {
      padding: .45rem 1.1rem;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: var(--card-bg);
      font-size: .88rem;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      transition: all .2s;
    }
    .city-tab:hover { border-color: var(--accent); color: var(--accent); }
    .city-tab.active {
      background: var(--ink);
      border-color: var(--ink);
      color: #fff;
    }
    .city-tab-gps {
      border-color: #3498db;
      color: #3498db;
    }
    .city-tab-gps:hover {
      background: #ebf5fb;
      border-color: #2980b9;
      color: #2980b9;
    }
    .city-tab-gps.active {
      background: #2980b9;
      border-color: #2980b9;
      color: #fff;
    }
    .city-tab-gps.locating {
      opacity: .7;
      cursor: wait;
      pointer-events: none;
    }

    /* 天氣卡片主體 */
    .weather-main-card {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 60%, #0f3460 100%);
      border-radius: 20px;
      padding: 2rem;
      color: #fff;
      margin-bottom: 1.2rem;
      position: relative;
      overflow: hidden;
    }
    .weather-main-card::before {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 180px; height: 180px;
      background: radial-gradient(circle, rgba(255,255,255,.06) 0%, transparent 70%);
      border-radius: 50%;
    }
    .weather-city-name {
      font-size: .95rem;
      opacity: .7;
      margin-bottom: .3rem;
    }
    .weather-temp-row {
      display: flex;
      align-items: flex-end;
      gap: 1rem;
      margin-bottom: .5rem;
    }
    .weather-temp {
      font-size: 4rem;
      font-weight: 800;
      line-height: 1;
      letter-spacing: -.03em;
    }
    .weather-icon-big { font-size: 3rem; line-height: 1; }
    .weather-desc {
      font-size: 1rem;
      opacity: .85;
      margin-bottom: 1.2rem;
    }
    .weather-stats {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
    }
    .weather-stat {
      display: flex;
      flex-direction: column;
      gap: .15rem;
    }
    .weather-stat-label {
      font-size: .72rem;
      opacity: .6;
      text-transform: uppercase;
      letter-spacing: .05em;
    }
    .weather-stat-value {
      font-size: .95rem;
      font-weight: 600;
    }

    /* 每日預報 */
    .forecast-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: .75rem;
    }
    .forecast-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1rem .8rem;
      text-align: center;
      transition: box-shadow .2s;
    }
    .forecast-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.08); }
    .forecast-day {
      font-size: .78rem;
      font-weight: 700;
      color: var(--muted);
      margin-bottom: .4rem;
    }
    .forecast-icon { font-size: 1.8rem; margin-bottom: .4rem; }
    .forecast-hi {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--ink);
    }
    .forecast-lo {
      font-size: .85rem;
      color: var(--muted);
      margin-top: .1rem;
    }
    .forecast-rain {
      font-size: .75rem;
      color: #3498db;
      margin-top: .3rem;
      font-weight: 500;
    }

    /* 天氣載入/錯誤 */
    .weather-loading {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--muted);
    }
    .weather-loading .spinner {
      width: 30px; height: 30px;
      border: 3px solid var(--border);
      border-top-color: #3498db;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 0 auto 1rem;
    }
    .weather-error {
      background: #fff3cd;
      border: 1px solid #ffc107;
      border-radius: 10px;
      padding: 1rem 1.2rem;
      font-size: .88rem;
      color: #856404;
      margin-bottom: 1rem;
    }

    @media (max-width: 560px) {
      .sidebar { width: 240px; }
      .weather-temp { font-size: 3rem; }
      .forecast-grid { grid-template-columns: repeat(auto-fill, minmax(85px, 1fr)); }
    }

    /* ── LUGGAGE PAGE ── */
    .luggage-container {
      max-width: 780px;
      margin: 0 auto;
      padding: 2rem 1rem 4rem;
    }
    .luggage-page-title {
      font-family: 'Noto Serif TC', serif;
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: .3rem;
    }
    .luggage-page-subtitle {
      font-size: .88rem;
      color: var(--muted);
      margin-bottom: 1.5rem;
    }

    /* 新增按鈕 */
    .luggage-add-btn {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      padding: .6rem 1.2rem;
      background: var(--ink);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: .9rem;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 1.8rem;
      transition: opacity .2s;
      font-family: 'Noto Sans TC', sans-serif;
    }
    .luggage-add-btn:hover { opacity: .85; }

    /* 持有人群組 */
    .owner-group {
      margin-bottom: 1.8rem;
    }
    .owner-title {
      font-family: 'Noto Serif TC', serif;
      font-size: 1.2rem;
      font-weight: 700;
      padding: .5rem 0 .6rem;
      border-bottom: 2px solid var(--ink);
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: .5rem;
    }
    .owner-badge {
      font-size: .72rem;
      background: var(--ink);
      color: #fff;
      padding: .15rem .5rem;
      border-radius: 20px;
      font-weight: 600;
    }

    /* 類型子群組 */
    .type-group {
      margin-bottom: 1rem;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    .type-group-header {
      background: #f5f4f0;
      padding: .6rem 1rem;
      font-size: .82rem;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: .05em;
      text-transform: uppercase;
    }

    /* 行李項目 */
    .luggage-item {
      display: flex;
      align-items: center;
      gap: .8rem;
      padding: .85rem 1rem;
      border-top: 1px solid var(--border);
      transition: background .15s;
    }
    .luggage-item:first-of-type { border-top: none; }
    .luggage-item:hover { background: #fafaf8; }

    .luggage-checkbox {
      width: 22px; height: 22px;
      border-radius: 6px;
      border: 2px solid var(--border);
      background: #fff;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .15s, border-color .15s;
      position: relative;
    }
    .luggage-checkbox.checked {
      background: #2e7d32;
      border-color: #2e7d32;
    }
    .luggage-checkbox.checked::after {
      content: '';
      width: 5px; height: 9px;
      border: 2px solid #fff;
      border-top: none;
      border-left: none;
      transform: rotate(45deg) translateY(-1px);
      display: block;
    }
    .luggage-checkbox.loading {
      pointer-events: none;
      opacity: .5;
    }

    .luggage-content {
      flex: 1;
      font-size: .95rem;
      color: var(--ink);
      transition: opacity .2s;
    }
    .luggage-content.checked {
      text-decoration: line-through;
      color: var(--muted);
    }

    /* 行李項目操作按鈕 */
    .luggage-actions {
      display: flex;
      gap: .3rem;
      opacity: 0;
      transition: opacity .2s;
    }
    .luggage-item:hover .luggage-actions { opacity: 1; }
    .luggage-action-btn {
      width: 30px; height: 30px;
      border-radius: 7px;
      border: 1px solid var(--border);
      background: #fff;
      cursor: pointer;
      font-size: .85rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .15s;
    }
    .luggage-action-btn:hover { background: #f0f0f0; }

    /* Modal 彈窗 */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.5);
      z-index: 500;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #fff;
      border-radius: 16px;
      padding: 1.8rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,.2);
    }
    .modal-title {
      font-family: 'Noto Serif TC', serif;
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 1.2rem;
    }
    .modal-field {
      margin-bottom: 1rem;
    }
    .modal-label {
      display: block;
      font-size: .82rem;
      font-weight: 700;
      color: var(--muted);
      margin-bottom: .35rem;
    }
    .modal-input {
      width: 100%;
      padding: .65rem .9rem;
      border: 1.5px solid var(--border);
      border-radius: 9px;
      font-size: .95rem;
      font-family: 'Noto Sans TC', sans-serif;
      color: var(--ink);
      outline: none;
      transition: border-color .2s;

    .modal-input:focus { border-color: var(--ink); }
    .modal-btns {
      display: flex;
      gap: .7rem;
      margin-top: 1.5rem;
      justify-content: flex-end;
    }
    .modal-btn {
      padding: .6rem 1.4rem;
      border-radius: 9px;
      border: none;
      font-size: .9rem;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Noto Sans TC', sans-serif;
      transition: opacity .2s;
    }
    .modal-btn:hover { opacity: .85; }
    .modal-btn-cancel { background: #f0f0f0; color: var(--muted); }
    .modal-btn-submit { background: var(--ink); color: #fff; }
    .modal-btn-delete { background: #fdecea; color: #c0392b; }

    /* 進度統計 */
    .luggage-progress {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem 1.2rem;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .progress-bar-wrap {
      flex: 1;
      height: 8px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      background: #2e7d32;
      border-radius: 4px;
      transition: width .4s ease;
    }
    .progress-text {
      font-size: .85rem;
      font-weight: 700;
      color: var(--ink);
      white-space: nowrap;
    }
  </style>
</head>

<script>
// ════════════════════════════════════════════
//  ⚙️  設定區 — 只需修改這裡
// ════════════════════════════════════════════
const CONFIG = {
  API_KEY:      '{{SHEETS_API_KEY}}',
  SHEET_ID:     '{{SHEET_ID}}',
  GAS_URL:      '{{GAS_URL}}',
  TRIP_TITLE:   '🎌 京坂旅遊行程',
  TRIP_SUBTITLE:'京都・大阪',
  VERSION:      'v1.0.1',   // ← 版本號，可自行修改
};
// ════════════════════════════════════════════

// 🚀 啟動 log
console.log(
  `%c 🎌 京坂旅遊行程 ${CONFIG.VERSION} `,
  'background:#1a1a2e;color:#fff;font-size:14px;font-weight:bold;padding:4px 10px;border-radius:6px;'
);
console.log('%c[Config] GAS_URL:', 'color:#3498db;font-weight:bold;', CONFIG.GAS_URL);
console.log('%c[Config] SHEET_ID:', 'color:#3498db;font-weight:bold;', CONFIG.SHEET_ID);

// 欄位對應（A~J）
const COL = {
  TYPE: 0,        // A 類型
  TIME_START: 1,  // B 時間(起)
  TIME_END: 2,    // C 時間(迄)
  PLACE: 3,       // D 目的地
  MAP_URL: 4,     // E 目的地(googlemap)
  NAV_ADDR: 5,    // F 導航地址
  COST: 6,        // G 花費
  CURRENCY: 7,    // H 幣別
  NOTE1: 8,       // I 備註
  NOTE2: 9,       // J 備註2
};

const TYPE_META = {
  '景點': { icon: '🏛️', cls: 'sight' },
  '餐廳': { icon: '🍜', cls: 'food' },
  '住宿': { icon: '🏨', cls: 'hotel' },
  '購物': { icon: '🛍️', cls: 'shop' },
  '其他': { icon: '📌', cls: 'other' },
};

// ── 工具函式 ──────────────────────────────────
function escHtml(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── 解析工作頁名稱，萃取「DayN」和日期 ──────────
function parseSheetName(name) {
  // 支援 "Day1(4/17)" 或 "Day1" 等格式
  const m = name.match(/Day\s*(\d+)(?:\(([^)]+)\))?/i);
  if (!m) return null;
  return { day: parseInt(m[1]), date: m[2] || '', raw: name };
}

// ── 取得所有工作頁名稱 ────────────────────────
async function fetchSheetNames() {
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SHEET_ID}?key=${CONFIG.API_KEY}&fields=sheets.properties.title`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`無法讀取試算表：${res.status}`);
  const data = await res.json();
  return data.sheets.map(s => s.properties.title);
}

// ── 取得單一工作頁資料 ────────────────────────
async function fetchSheet(sheetName) {
  const range = encodeURIComponent(`'${sheetName}'!A:J`);
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SHEET_ID}/values/${range}?key=${CONFIG.API_KEY}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`無法讀取工作頁 ${sheetName}`);
  const data = await res.json();
  return data.values || [];
}

// ── 渲染單一行程卡片 ─────────────────────────
function renderCard(row) {
  const type     = row[COL.TYPE]       || '';
  const tStart   = row[COL.TIME_START] || '';
  const tEnd     = row[COL.TIME_END]   || '';
  const place    = row[COL.PLACE]      || '';
  const mapUrl   = row[COL.MAP_URL]    || '';
  const navAddr  = row[COL.NAV_ADDR]   || '';
  const cost     = row[COL.COST]       || '';
  const currency = row[COL.CURRENCY]   || '';
  const note1    = row[COL.NOTE1]      || '';
  const note2    = row[COL.NOTE2]      || '';

  if (!place && !type) return '';

  const meta = TYPE_META[type] || { icon: '📍', cls: 'other' };

  // 類型標籤
  const tagHtml = type
    ? `<span class="type-tag ${meta.cls}">${meta.icon} ${escHtml(type)}</span>`
    : '';

  // 地點名稱（如有 map URL 則可點擊）
  const placeLinkHtml = mapUrl
    ? `<a class="place-link" href="${escHtml(mapUrl)}" target="_blank" rel="noopener">${escHtml(place)}</a>`
    : `<span class="place-link no-link">${escHtml(place)}</span>`;

  // 導航按鈕：有填導航地址才顯示
  const navBtnHtml = navAddr ? `
    <a class="nav-btn" href="javascript:void(0)" onclick="navigate('${escHtml(navAddr)}')" title="導航至此地點">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
      </svg>
      <span>導航</span>
    </a>` : '';

  // 時間欄位：起迄字體相同，留空不顯示
  const timeHtml = `
    ${tStart ? `<div class="time-start">${escHtml(tStart)}</div>` : ''}
    ${tStart && tEnd ? `<div class="time-arrow">↓</div>` : ''}
    ${tEnd   ? `<div class="time-end">${escHtml(tEnd)}</div>` : ''}
  `;

  // 備註：分兩行，明確標示備註1/2，留空不顯示
  let notesHtml = '';
  const noteLines = [];
  if (note1) noteLines.push(`<div class="note-item"><span class="note-label">備註1</span><span>${escHtml(note1)}</span></div>`);
  if (note2) noteLines.push(`<div class="note-item"><span class="note-label">備註2</span><span>${escHtml(note2)}</span></div>`);
  if (noteLines.length) notesHtml = `<div class="card-notes">${noteLines.join('')}</div>`;

  // 花費
  const costHtml = cost
    ? `<div class="card-cost">💰 ${escHtml(cost)} ${escHtml(currency)}</div>`
    : '';

  return `
    <div class="item-card">
      <div class="card-top">
        <div class="time-col">${timeHtml}</div>
        <div class="time-divider"></div>
        <div class="card-body">
          <div class="card-title-row">
            ${tagHtml}
          </div>
          <div class="place-nav-row">
            ${placeLinkHtml}
            ${navBtnHtml}
          </div>
          ${notesHtml}
          ${costHtml}
        </div>
      </div>
    </div>`;
}

// ── 渲染一天的區塊 ────────────────────────────
function renderDay(meta, rows) {
  const id = `day-${meta.day}`;
  const cards = rows.map(renderCard).join('');
  return `
    <section class="day-section" id="${id}">
      <div class="day-header">
        <h2>Day ${meta.day}</h2>
        ${meta.date ? `<div class="day-date">📅 ${meta.date}</div>` : ''}
      </div>
      ${cards || '<p style="color:#aaa;font-size:.9rem;">此天尚無行程資料</p>'}
    </section>`;
}

// ── 渲染 Tab 按鈕 ─────────────────────────────
function renderTabs(days) {
  return days.map(d =>
    `<button class="tab-btn" data-day="${d.day}" onclick="switchDay(${d.day})">
      Day ${d.day}${d.date ? '<br><small style="font-size:.7rem;opacity:.7">'+escHtml(d.date)+'</small>' : ''}
    </button>`
  ).join('');
}

// ── 切換 Tab ──────────────────────────────────
function switchDay(n) {
  document.querySelectorAll('.day-section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  const sec = document.getElementById(`day-${n}`);
  if (sec) sec.classList.add('active');
  const btn = document.querySelector(`.tab-btn[data-day="${n}"]`);
  if (btn) {
    btn.classList.add('active');
    btn.scrollIntoView({ inline: 'center', behavior: 'smooth' });
  }
}

// ── 主流程 ────────────────────────────────────
async function init() {
  const main = document.getElementById('main-content');
  const subtitle = document.getElementById('trip-subtitle');
  subtitle.textContent = CONFIG.TRIP_SUBTITLE;

  // 尚未填入 API 金鑰時顯示說明
  if (CONFIG.API_KEY === 'YOUR_GOOGLE_SHEETS_API_KEY') {
    main.innerHTML = `
      <div class="config-banner">
        <strong>⚙️ 設定提示：</strong>請開啟 <code>index.html</code>，在頂部的 <code>CONFIG</code> 區塊填入你的
        <code>API_KEY</code>（Google Sheets API 金鑰）後，重新整理即可看到行程。<br><br>
        申請步驟：Google Cloud Console → 建立專案 → 啟用 Sheets API → 建立 API 金鑰 → 貼到 CONFIG.API_KEY。
      </div>
      <div class="state-msg">等待 API 金鑰設定完成…</div>`;
    return;
  }

  try {
    const names = await fetchSheetNames();

    // 跳過非行程工作頁（行李確認表等），只處理 Day 開頭的工作頁
    const SKIP_SHEETS = ['行李確認表'];
    const daySheets = names
      .filter(n => !SKIP_SHEETS.includes(n))
      .map(n => ({ ...parseSheetName(n), sheetName: n }))
      .filter(d => d !== null && d.day != null)
      .sort((a, b) => a.day - b.day);

    if (!daySheets.length) throw new Error('找不到 Day 開頭的工作頁');

    // 並行抓所有工作頁
    const allRows = await Promise.all(daySheets.map(d => fetchSheet(d.sheetName)));

    // 組建 HTML
    const tabsHtml = renderTabs(daySheets);
    const sectionsHtml = daySheets.map((d, i) => {
      const rows = allRows[i].slice(1).filter(r => r.some(c => c)); // 跳過標題列，濾空列
      return renderDay(d, rows);
    }).join('');

    document.getElementById('tabs-container').innerHTML = tabsHtml;
    main.innerHTML = sectionsHtml;

    // 預設顯示第一天
    switchDay(daySheets[0].day);

  } catch (err) {
    main.innerHTML = `
      <div class="state-msg">
        ❌ 讀取失敗：${escHtml(err.message)}<br>
        <small style="margin-top:.5rem;display:block;">請確認 API 金鑰、試算表 ID 是否正確，以及試算表已設定為「知道連結的任何人可以檢視」。</small>
      </div>`;
  }
}

// ── 用隱藏 <a> 標籤跳轉（iOS Safari 相容）──
function openUrl(url) {
  const a = document.createElement('a');
  a.href = url;
  a.target = '_blank';
  a.rel = 'noopener';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

// ── 導航函式：直接用導航地址搜尋，iOS / Android / 桌面全相容 ──
function navigate(navAddr) {
  // 用 Google Maps 搜尋地址並直接開啟路線規劃
  // saddr 留空讓 Maps 自動抓目前 GPS 位置當起點
  const navUrl = `https://maps.google.com/?daddr=${encodeURIComponent(navAddr)}&dirflg=d`;
  openUrl(navUrl);
}

// ════════════════════════════════════════════
//  🍔 漢堡選單 & 頁面切換
// ════════════════════════════════════════════
function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebar-overlay');
  const btn     = document.getElementById('hamburger-btn');
  const isOpen  = sidebar.classList.contains('open');
  sidebar.classList.toggle('open', !isOpen);
  overlay.classList.toggle('open', !isOpen);
  btn.classList.toggle('open', !isOpen);
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('open');
  document.getElementById('hamburger-btn').classList.remove('open');
}

let currentPage = 'itinerary';
function switchPage(page) {
  console.log('[switchPage] 切換到:', page);
  closeSidebar();
  currentPage = page;

  // 頁面切換
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(`page-${page}`).classList.add('active');

  // 選單 active 狀態
  document.querySelectorAll('.sidebar-nav-item').forEach(b => b.classList.remove('active'));
  document.getElementById(`menu-${page}`).classList.add('active');

  // Day tabs 只在行程頁顯示
  const tabsWrapper = document.getElementById('tabs-wrapper');
  tabsWrapper.classList.toggle('visible', page === 'itinerary');

  // 切換到天氣頁時載入
  if (page === 'weather') loadWeather(currentCity);
  // 切換到行李頁時載入
  if (page === 'luggage') loadLuggage();
}

// ════════════════════════════════════════════
//  🌤️ 天氣功能（Open-Meteo 免費 API，不需金鑰）
// ════════════════════════════════════════════

  osaka: { name: '大阪', lat: 34.6937, lon: 135.5023, tz: 'Asia/Tokyo' },

  1:  { label: '大致晴',   icon: '🌤️' },
  2:  { label: '部分多雲', icon: '⛅' },

  48: { label: '凍霧',     icon: '🌫️' },
  51: { label: '毛毛雨',   icon: '🌦️' },
  53: { label: '毛毛雨',   icon: '🌦️' },
  55: { label: '毛毛雨',   icon: '🌦️' },
  61: { label: '小雨',     icon: '🌧️' },
  63: { label: '中雨',     icon: '🌧️' },
  65: { label: '大雨',     icon: '🌧️' },
  71: { label: '小雪',     icon: '🌨️' },
  73: { label: '中雪',     icon: '❄️' },
  75: { label: '大雪',     icon: '❄️' },
  80: { label: '陣雨',     icon: '🌦️' },
  81: { label: '陣雨',     icon: '🌧️' },
  82: { label: '暴雨',     icon: '⛈️' },
  95: { label: '雷雨',     icon: '⛈️' },
  99: { label: '冰雹雷雨', icon: '⛈️' },
};
function getWmo(code) {
  return WMO_CODES[code] || { label: '未知', icon: '🌡️' };
}

const WEEKDAYS = ['日', '一', '二', '三', '四', '五', '六'];

let currentCity = 'kyoto';
let weatherCache = {};

// ── 用座標查天氣（共用邏輯）────────────────────
async function fetchWeatherByCoord(lat, lon, cityName) {
  const content = document.getElementById('weather-content');
  const cacheKey = `${lat.toFixed(3)},${lon.toFixed(3)}`;

  if (weatherCache[cacheKey]) {
    renderWeather(weatherCache[cacheKey], { name: cityName });
    return;
  }

  content.innerHTML = `<div class="weather-loading"><div class="spinner"></div>載入 ${cityName} 天氣中…</div>`;

  try {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}`
      + `&current=temperature_2m,weathercode,windspeed_10m,relative_humidity_2m,apparent_temperature`
      + `&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_probability_max`
      + `&timezone=auto&forecast_days=10`;

    const res = await fetch(url);
    if (!res.ok) throw new Error('API 回應異常');
    const data = await res.json();
    weatherCache[cacheKey] = data;
    renderWeather(data, { name: cityName });
  } catch (err) {
    content.innerHTML = `
      <div class="weather-error">⚠️ 天氣資料載入失敗：${escHtml(err.message)}<br>
      請確認網路連線後重新整理。</div>`;
  }
}

// ── 載入城市天氣 ─────────────────────────────
async function loadWeather(cityKey) {
  currentCity = cityKey;
  if (cityKey === 'gps') {
    loadGpsWeather();
    return;
  }
  const city = CITIES[cityKey];
  await fetchWeatherByCoord(city.lat, city.lon, city.name);
}

// ── GPS 定位查天氣 ────────────────────────────
function loadGpsWeather() {
  const btn = document.getElementById('city-gps');
  const btnText = document.getElementById('gps-btn-text');
  const content = document.getElementById('weather-content');

  if (!navigator.geolocation) {
    content.innerHTML = `<div class="weather-error">⚠️ 你的瀏覽器不支援定位功能。</div>`;
    return;
  }

  // 定位中狀態
  btn.classList.add('locating');
  btnText.textContent = '⏳ 定位中…';
  content.innerHTML = `<div class="weather-loading"><div class="spinner"></div>正在取得你的位置…</div>`;

  navigator.geolocation.getCurrentPosition(
    async (pos) => {
      btn.classList.remove('locating');
      btnText.textContent = '📍 我的位置';
      const { latitude, longitude } = pos.coords;
      await fetchWeatherByCoord(latitude, longitude, '我的位置');
    },
    (err) => {
      btn.classList.remove('locating');
      btnText.textContent = '📍 我的位置';
      const msg = err.code === 1 ? '請允許瀏覽器存取你的位置權限後再試。'
                : err.code === 2 ? '無法取得位置，請確認 GPS 是否開啟。'
                : '定位逾時，請再試一次。';
      content.innerHTML = `<div class="weather-error">⚠️ 定位失敗：${msg}</div>`;
      // 恢復到京都
      document.querySelectorAll('.city-tab').forEach(b => b.classList.remove('active'));
      document.getElementById('city-kyoto').classList.add('active');
      currentCity = 'kyoto';
      loadWeather('kyoto');
    },
    { timeout: 10000, maximumAge: 60000 }
  );
}

function selectCity(cityKey) {
  currentCity = cityKey;
  document.querySelectorAll('.city-tab').forEach(b => b.classList.remove('active'));
  document.getElementById(`city-${cityKey}`).classList.add('active');
  loadWeather(cityKey);
}

function renderWeather(data, city) {
  const cur = data.current;
  const daily = data.daily;
  const wmo = getWmo(cur.weathercode);

  // 今日預報卡
  const mainCard = `
    <div class="weather-main-card">
      <div class="weather-city-name">📍 ${city.name}</div>
      <div class="weather-temp-row">
        <div class="weather-temp">${Math.round(cur.temperature_2m)}°</div>
        <div class="weather-icon-big">${wmo.icon}</div>
      </div>
      <div class="weather-desc">${wmo.label}　體感 ${Math.round(cur.apparent_temperature)}°C</div>
      <div class="weather-stats">
        <div class="weather-stat">
          <span class="weather-stat-label">濕度</span>
          <span class="weather-stat-value">${cur.relative_humidity_2m}%</span>
        </div>
        <div class="weather-stat">
          <span class="weather-stat-label">風速</span>
          <span class="weather-stat-value">${cur.windspeed_10m} km/h</span>
        </div>
        <div class="weather-stat">
          <span class="weather-stat-label">最高</span>
          <span class="weather-stat-value">${Math.round(daily.temperature_2m_max[0])}°C</span>
        </div>
        <div class="weather-stat">
          <span class="weather-stat-label">最低</span>
          <span class="weather-stat-value">${Math.round(daily.temperature_2m_min[0])}°C</span>
        </div>
      </div>
    </div>`;

  // 10 天預報
  const forecastCards = daily.time.map((dateStr, i) => {
    const d = new Date(dateStr);
    const dayLabel = i === 0 ? '今天' : i === 1 ? '明天' : `${d.getMonth()+1}/${d.getDate()}（${WEEKDAYS[d.getDay()]}）`;
    const fw = getWmo(daily.weathercode[i]);
    const rain = daily.precipitation_probability_max[i];
    return `
      <div class="forecast-card">
        <div class="forecast-day">${dayLabel}</div>
        <div class="forecast-icon">${fw.icon}</div>
        <div class="forecast-hi">${Math.round(daily.temperature_2m_max[i])}°</div>
        <div class="forecast-lo">${Math.round(daily.temperature_2m_min[i])}°</div>
        ${rain != null ? `<div class="forecast-rain">💧${rain}%</div>` : ''}
      </div>`;
  }).join('');

  document.getElementById('weather-content').innerHTML = mainCard
    + `<div class="forecast-grid">${forecastCards}</div>`;
}

function selectCity(cityKey) {
  currentCity = cityKey;
  document.querySelectorAll('.city-tab').forEach(b => b.classList.remove('active'));
  document.getElementById(`city-${cityKey}`).classList.add('active');
  loadWeather(cityKey);
}

// ════════════════════════════════════════════
//  🧳 行李確認表
// ════════════════════════════════════════════
let luggageItems  = [];   // 目前所有資料
let modalMode     = 'add'; // 'add' | 'edit'
let editingRow    = null;  // 編輯中的試算表列號

// ── 呼叫 GAS API ─────────────────────────────
async function gasRequest(payload) {
  // Apps Script 不支援 OPTIONS 預檢，改用 no-cors + FormData 方式
  // 用 URL 參數夾帶 action，body 用 application/x-www-form-urlencoded
  const form = new URLSearchParams();
  form.append('payload', JSON.stringify(payload));

  const res = await fetch(CONFIG.GAS_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: form.toString(),
  });
  const data = await res.json();
  if (!data.ok) throw new Error(data.error || '操作失敗');
  return data.data;
}

// ── JSONP 方式讀取 GAS（繞過 CORS GET 限制）────
function fetchGasJsonp(url) {
  return new Promise((resolve, reject) => {
    const cbName = 'gasCallback_' + Date.now();
    const script = document.createElement('script');
    const timer  = setTimeout(() => {
      cleanup();
      reject(new Error('請求逾時'));
    }, 10000);

    function cleanup() {
      clearTimeout(timer);
      delete window[cbName];
      if (script.parentNode) script.parentNode.removeChild(script);
    }

    window[cbName] = function(data) {
      console.log('[JSONP] callback 收到資料:', data);
      cleanup();
      resolve(data);
    };

    script.src = `${url}?callback=${cbName}`;
    console.log('[JSONP] 發送請求:', script.src);
    script.onerror = (err) => { console.error('[JSONP] script 載入錯誤:', err); cleanup(); reject(new Error('載入失敗')); };
    document.head.appendChild(script);
  });
}

// ── 載入行李清單 ─────────────────────────────
async function loadLuggage() {
  const list = document.getElementById('luggage-list');
  list.innerHTML = `<div class="state-msg"><div class="spinner"></div>載入行李清單…</div>`;
  document.getElementById('luggage-progress').style.display = 'none';

  if (!CONFIG.GAS_URL || !CONFIG.GAS_URL.startsWith('https://script.google.com')) {
    list.innerHTML = `<div class="config-banner">
      <strong>⚙️ 設定提示：</strong>請至 GitHub Secrets 新增 <code>GAS_URL</code>（Google Apps Script Web App 網址）後重新部署。
    </div>`;
    return;
  }

  try {
    console.log('[Luggage] 開始載入，GAS_URL:', CONFIG.GAS_URL);
    const data = await fetchGasJsonp(CONFIG.GAS_URL);
    console.log('[Luggage] JSONP 回應:', data);
    if (!data.ok) throw new Error(data.error);
    luggageItems = data.data;
    console.log('[Luggage] 資料筆數:', luggageItems.length, luggageItems);
    renderLuggage();
  } catch (e) {
    console.error('[Luggage] 載入失敗:', e);
    list.innerHTML = `<div class="state-msg">❌ 載入失敗：${escHtml(e.message)}</div>`;
  }
}

// ── 渲染行李清單 ─────────────────────────────
function renderLuggage() {
  const list = document.getElementById('luggage-list');

  if (!luggageItems.length) {
    list.innerHTML = `<div class="state-msg" style="padding:2rem">尚無行李項目，點擊「新增項目」開始建立清單。</div>`;
    document.getElementById('luggage-progress').style.display = 'none';
    return;
  }

  // 更新進度條
  const total   = luggageItems.length;
  const done    = luggageItems.filter(i => i.checked).length;
  const pct     = total ? Math.round(done / total * 100) : 0;
  document.getElementById('luggage-progress').style.display = 'flex';
  document.getElementById('progress-text').textContent = `${done} / ${total} 已確認`;
  document.getElementById('progress-bar').style.width = pct + '%';

  // 依持有人 → 類型分組
  const ownerMap = {};
  for (const item of luggageItems) {
    if (!ownerMap[item.owner]) ownerMap[item.owner] = {};
    if (!ownerMap[item.owner][item.type]) ownerMap[item.owner][item.type] = [];
    ownerMap[item.owner][item.type].push(item);
  }

  let html = '';
  for (const owner of Object.keys(ownerMap)) {
    const ownerItems = Object.values(ownerMap[owner]).flat();
    const ownerDone  = ownerItems.filter(i => i.checked).length;
    html += `
      <div class="owner-group">
        <div class="owner-title">
          👤 ${escHtml(owner)}
          <span class="owner-badge">${ownerDone}/${ownerItems.length}</span>
        </div>`;

    for (const type of Object.keys(ownerMap[owner])) {
      html += `
        <div class="type-group">
          <div class="type-group-header">🏷️ ${escHtml(type)}</div>`;

      for (const item of ownerMap[owner][type]) {
        const chk = item.checked;
        html += `
          <div class="luggage-item" id="luggage-row-${item.row}">
            <div class="luggage-checkbox ${chk ? 'checked' : ''}"
                 onclick="toggleCheck(${item.row}, ${!chk})"></div>
            <div class="luggage-content ${chk ? 'checked' : ''}">${escHtml(item.content)}</div>
            <div class="luggage-actions">
              <button class="luggage-action-btn" onclick="openEditModal(${item.row})" title="編輯">✏️</button>
            </div>
          </div>`;
      }
      html += `</div>`;
    }
    html += `</div>`;
  }
  list.innerHTML = html;
}

// ── 切換勾選 ─────────────────────────────────
async function toggleCheck(row, checked) {
  const box = document.querySelector(`#luggage-row-${row} .luggage-checkbox`);
  const txt = document.querySelector(`#luggage-row-${row} .luggage-content`);
  if (!box) return;

  // 樂觀更新 UI
  box.classList.add('loading');
  box.classList.toggle('checked', checked);
  txt.classList.toggle('checked', checked);

  // 更新本地資料
  const item = luggageItems.find(i => i.row === row);
  if (item) item.checked = checked;

  // 更新進度條
  const total = luggageItems.length;
  const done  = luggageItems.filter(i => i.checked).length;
  document.getElementById('progress-text').textContent = `${done} / ${total} 已確認`;
  document.getElementById('progress-bar').style.width = (total ? Math.round(done/total*100) : 0) + '%';

  try {
    await gasRequest({ action: 'check', row, checked });
  } catch (e) {
    // 失敗則回滾
    box.classList.toggle('checked', !checked);
    txt.classList.toggle('checked', !checked);
    if (item) item.checked = !checked;
    alert('同步失敗：' + e.message);
  } finally {
    box.classList.remove('loading');
  }
}

// ── Modal 開啟/關閉 ───────────────────────────
function openAddModal() {
  modalMode = 'add';
  editingRow = null;
  document.getElementById('modal-title').textContent   = '新增行李項目';
  document.getElementById('modal-owner').value         = '';
  document.getElementById('modal-type').value          = '';
  document.getElementById('modal-content').value       = '';
  document.getElementById('modal-submit-btn').textContent = '新增';
  document.getElementById('modal-delete-btn').style.display = 'none';
  document.getElementById('item-modal').classList.add('open');
  document.getElementById('modal-owner').focus();
}

function openEditModal(row) {
  const item = luggageItems.find(i => i.row === row);
  if (!item) return;
  modalMode  = 'edit';
  editingRow = row;
  document.getElementById('modal-title').textContent   = '編輯行李項目';
  document.getElementById('modal-owner').value         = item.owner;
  document.getElementById('modal-type').value          = item.type;
  document.getElementById('modal-content').value       = item.content;
  document.getElementById('modal-submit-btn').textContent = '儲存';
  document.getElementById('modal-delete-btn').style.display = 'inline-flex';
  document.getElementById('item-modal').classList.add('open');
}

function closeModal() {
  document.getElementById('item-modal').classList.remove('open');
}

// ── 送出 Modal（新增 or 編輯）────────────────
async function submitModal() {
  const owner   = document.getElementById('modal-owner').value.trim();
  const type    = document.getElementById('modal-type').value.trim();
  const content = document.getElementById('modal-content').value.trim();
  if (!owner || !type || !content) { alert('請填寫所有欄位'); return; }

  const btn = document.getElementById('modal-submit-btn');
  btn.disabled = true;
  btn.textContent = '處理中…';

  try {
    if (modalMode === 'add') {
      await gasRequest({ action: 'add', owner, type, content });
    } else {
      await gasRequest({ action: 'edit', row: editingRow, owner, type, content });
    }
    closeModal();
    await loadLuggage();  // 重新載入以反映最新排序
  } catch (e) {
    alert('操作失敗：' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = modalMode === 'add' ? '新增' : '儲存';
  }
}

// ── 刪除項目 ─────────────────────────────────
async function deleteItem() {
  if (!confirm('確定要刪除這個項目嗎？')) return;
  const btn = document.getElementById('modal-delete-btn');
  btn.disabled = true;
  btn.textContent = '刪除中…';
  try {
    await gasRequest({ action: 'delete', row: editingRow });
    closeModal();
    await loadLuggage();
  } catch (e) {
    alert('刪除失敗：' + e.message);
    btn.disabled = false;
    btn.textContent = '刪除';
  }
}

// Modal 點外部關閉
document.getElementById('item-modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

init();
</script>
